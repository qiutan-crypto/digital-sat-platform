<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - SAT Platform</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { padding: 40px 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .table-container { background: var(--surface); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px 20px; border-bottom: 1px solid var(--border-color); }
        th { background: rgba(255, 255, 255, 0.05); font-weight: 600; color: var(--text-secondary); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.05em; }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }
        .score-badge { background: rgba(59, 130, 246, 0.2); color: #60a5fa; padding: 4px 10px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; }
        .total-score { color: #34d399; font-weight: 700; font-size: 1.1rem; }
        .empty-state { text-align: center; padding: 50px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div style="max-width: 1000px; margin: 0 auto;">
        <div class="admin-header">
            <div>
                <h1>Student Results Dashboard</h1>
                <p style="color: var(--text-secondary); margin-top: 5px;">View all submitted test scores in real-time.</p>
            </div>
            <div>
                <button id="refresh-btn" class="btn-primary" style="margin-right: 10px;">Refresh Data</button>
                <a href="index.html" class="btn-secondary" style="text-decoration: none;">Back to Home</a>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Student Name</th>
                        <th>Test ID</th>
                        <th>Total Score</th>
                        <th>R&W Score</th>
                        <th>Math Score</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    <tr><td colspan="6" class="empty-state">Loading results from Supabase...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- App Scripts -->
    <script src="js/supabase-config.js"></script>
    <script src="js/admin.js?v=4"></script>
</body>
</html>
